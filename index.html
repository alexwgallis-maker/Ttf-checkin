<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>T2F Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --accent: #1D9E75;
    --accent-dim: rgba(29,158,117,0.15);
    --text: #f0f0f0;
    --text-secondary: #777;
    --mono: 'DM Mono', monospace;
    --display: 'Barlow Condensed', sans-serif;
    --body: 'Barlow', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 20px calc(32px + var(--safe-bottom));
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .date-str {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .reset-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: var(--text-secondary); color: var(--text); }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 5px;
    line-height: 1.4;
  }

  .goals-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .goal-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .goal-row.complete { border-color: rgba(29,158,117,0.4); background: rgba(29,158,117,0.06); }
  .goal-emoji { font-size: 16px; width: 22px; flex-shrink: 0; }
  .goal-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .goal-row.complete .goal-name { color: var(--accent); }
  .bar-wrap { width: 60px; flex-shrink: 0; }
  .bar-track {
    height: 4px;
    background: var(--surface2);
    border-radius: 999px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.2s ease;
  }
  .bar-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 3px;
    text-align: right;
  }
  .goal-row.complete .bar-count { color: var(--accent); }
  .btns { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .adj {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .adj:active { background: var(--surface2); }

  .note-section { margin-top: 20px; }
  .note-section label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: block;
    margin-bottom: 8px;
  }
  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.6;
    padding: 12px 14px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #444; }
  textarea::placeholder { color: var(--text-secondary); }

  .gen-btn {
    margin-top: 16px;
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .gen-btn:active { opacity: 0.85; }

  .output-section { margin-top: 20px; display: none; }
  .output-section label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: block;
    margin-bottom: 8px;
  }
  .output-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.8;
    white-space: pre-wrap;
    color: var(--text);
    word-break: break-word;
  }
  .copy-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .copy-btn {
    padding: 9px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .copy-btn:active { border-color: var(--accent); }
  .copy-ok {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .divider { height: 1px; background: var(--border); margin: 24px 0; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="brand">T2F · Daily Check-in</div>
      <div class="date-str" id="date-str"></div>
    </div>
    <button class="reset-btn" onclick="resetWeek()">Reset week</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Day</div>
      <div class="stat-value accent" id="day-count">—</div>
      <div class="stat-sub">since Jan 3, 2026</div>
    </div>
    <div class="stat">
      <div class="stat-label">🔥 Streak</div>
      <div class="stat-value" id="streak-val">—</div>
      <div class="stat-sub">days checked in</div>
    </div>
  </div>

  <div class="goals-label">Goals</div>
  <div id="goals-container"></div>

  <div class="divider"></div>

  <div class="note-section">
    <label>Today's note</label>
    <textarea id="note" placeholder="Quick paragraph — what did you do today?"></textarea>
  </div>

  <button class="gen-btn" onclick="generate()">Generate Discord message</button>

  <div class="output-section" id="output-section">
    <label>Copy into Discord</label>
    <div class="output-box" id="output-box"></div>
    <div class="copy-row">
      <button class="copy-btn" onclick="copyMsg()">Copy</button>
      <span class="copy-ok" id="copy-ok">Copied ✓</span>
    </div>
  </div>

</div>

<script>
const GOALS = [
  { key: 'gym',       emoji: '🏋️', name: 'Gym',                max: 4 },
  { key: 'endurance', emoji: '🏃', name: 'Endurance',           max: 3 },
  { key: 'protein',   emoji: '🥩', name: 'Hit protein macro',   max: 7 },
  { key: 'journal',   emoji: '📓', name: 'Weekly journal',      max: 1 },
  { key: 'expenses',  emoji: '💸', name: 'Expense tracking',    max: 1 },
  { key: 'content',   emoji: '📲', name: 'Post content',        max: 3 },
  { key: 'ttfwork',   emoji: '⏱️', name: '1hr working on TTF', max: 1 },
  { key: 'meditation', emoji: '🧘', name: 'Morning meditation', max: 1 },
];

const S_STATE  = 'ttf_state_v6';
const S_STREAK = 'ttf_streak_v6';

// Anchors — day 225 = June 15 2026, streak 122
const ANCHOR_DATE  = new Date('2026-06-15');
const ANCHOR_DAY   = 225;

// Streak logic:
// - increments by 1 each calendar day you check in (hit Generate)
// - independent of goal completion; resets only if you skip a day entirely
const STREAK_INIT = { count: 122, lastCheckin: '2026-06-15' };

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

let state  = load(S_STATE, {});
let streak = load(S_STREAK, STREAK_INIT);

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}

function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

function getDayNum() {
  const now = new Date(); now.setHours(0,0,0,0);
  const anc = new Date(ANCHOR_DATE); anc.setHours(0,0,0,0);
  return ANCHOR_DAY + Math.round((now - anc) / 86400000);
}

// Called when the user checks in (hits Generate).
// Streak rises by 1 per calendar day, independent of goal completion.
function recordCheckin() {
  const today = todayStr();
  if (streak.lastCheckin === today) return; // already counted today

  const gap = streak.lastCheckin ? daysBetween(streak.lastCheckin, today) : 1;

  if (gap === 1) {
    streak.count += 1;        // consecutive day
  } else if (gap > 1) {
    streak.count = 1;         // missed one or more days — restart
  }

  streak.lastCheckin = today;
  save(S_STREAK, streak);
}

function render() {
  document.getElementById('date-str').textContent = new Date().toLocaleDateString('en-CA', {
    weekday:'long', month:'long', day:'numeric', year:'numeric'
  });
  document.getElementById('day-count').textContent = getDayNum();
  document.getElementById('streak-val').textContent = streak.count;

  const c = document.getElementById('goals-container');
  c.innerHTML = '';
  GOALS.forEach(g => {
    const val = state[g.key] || 0;
    const pct = Math.round(val / g.max * 100);
    const done = val >= g.max;
    const row = document.createElement('div');
    row.className = 'goal-row' + (done ? ' complete' : '');
    row.innerHTML = `
      <div class="goal-emoji">${g.emoji}</div>
      <div class="goal-name">${g.name}</div>
      <div class="bar-wrap">
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-count">${val}/${g.max}</div>
      </div>
      <div class="btns">
        <button class="adj" onclick="adj('${g.key}',-1)">−</button>
        <button class="adj" onclick="adj('${g.key}',1)">+</button>
      </div>`;
    c.appendChild(row);
  });
}

function adj(key, d) {
  const g = GOALS.find(x => x.key === key);
  state[key] = Math.max(0, Math.min(g.max, (state[key]||0) + d));
  save(S_STATE, state);
  render();
}

function resetWeek() {
  if (!confirm('Start a new week? This clears all goal counters. Your streak is not affected.')) return;
  state = {};
  save(S_STATE, state);
  document.getElementById('note').value = '';
  document.getElementById('output-section').style.display = 'none';
  render();
}

function bars(val, max) { return '█'.repeat(val) + '░'.repeat(max - val); }

function generate() {
  recordCheckin();

  const dateStr = new Date().toLocaleDateString('en-CA', { weekday:'long', month:'long', day:'numeric' });
  const note = document.getElementById('note').value.trim();
  const dayNum = getDayNum();

  // Strip emojis before padding so all bars align regardless of emoji width
  const plainLabels = GOALS.map(g => g.name);
  const maxLen = Math.max(...plainLabels.map(l => l.length)) + 2;

  const rows = GOALS.map((g, i) => {
    const val = state[g.key] || 0;
    const done = val >= g.max ? ' ✅' : '';
    const plainLabel = plainLabels[i].padEnd(maxLen, ' ');
    return `${g.emoji} ${plainLabel}${bars(val, g.max)} ${val}/${g.max}${done}`;
  });

  let msg = `📅 **Check-in — Day ${dayNum} — ${dateStr}**\n\n\`\`\`\n`;
  msg += rows.join('\n');
  msg += `\n\`\`\`\n🔥 Streak: ${streak.count}`;
  if (note) msg += `\n\n${note}`;

  document.getElementById('output-box').textContent = msg;
  document.getElementById('output-section').style.display = 'block';
  render();
}

function copyMsg() {
  const text = document.getElementById('output-box').textContent;
  navigator.clipboard.writeText(text).then(showCopied).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied();
  });
}

function showCopied() {
  const el = document.getElementById('copy-ok');
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2000);
}

render();
</script>
</body>
</html>
